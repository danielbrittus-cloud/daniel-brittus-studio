<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Horizon</title>
    <meta name="theme-color" content="#02060d">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2302060d'/%3E%3Cpath d='M32 8 54 56 32 45 10 56Z' fill='%2300e5ff'/%3E%3Cpath d='M32 17 43 43 32 37 21 43Z' fill='%23ffffff'/%3E%3C/svg%3E">
    <script src="phaser.min.js"></script>
    <style>
        /* Estilo para centralizar o jogo na tela e dar um "glow" de ficção científica */
        body {
            margin: 0;
            padding: 0;
            background-color: #030305; /* Fundo escuro do espaço */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            box-shadow: 0 0 40px rgba(0, 200, 255, 0.15); /* Brilho neon sutil nas bordas */
            border: 1px solid #111122;
            border-radius: 4px;
            image-rendering: auto;
            filter: saturate(1.03) contrast(1.02);
        }
        .mobile-landscape-gate {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 50% 20%, rgba(0, 229, 255, 0.24), transparent 32rem),
                linear-gradient(180deg, rgba(2, 6, 13, 0.92), rgba(1, 3, 8, 0.98));
            color: #e8fbff;
            text-align: center;
        }
        .mobile-landscape-gate.is-visible {
            display: grid;
        }
        .mobile-landscape-gate.is-hidden {
            display: none;
        }
        .mobile-landscape-card {
            width: min(440px, 100%);
            padding: 24px;
            border: 1px solid rgba(0, 229, 255, 0.38);
            border-radius: 8px;
            background: rgba(3, 10, 22, 0.82);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }
        .mobile-landscape-card h1 {
            margin: 0 0 10px;
            color: #00e5ff;
            font: 700 34px/1 Impact, sans-serif;
            letter-spacing: 0;
        }
        .mobile-landscape-card p {
            margin: 0 0 18px;
            color: #b8d6df;
            font: 600 15px/1.5 "Courier New", monospace;
        }
        .mobile-landscape-card button {
            width: 100%;
            min-height: 54px;
            border: 0;
            border-radius: 8px;
            background: linear-gradient(135deg, #00e5ff, #ffffff);
            color: #02060d;
            font: 900 16px/1 "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div id="mobile-landscape-gate" class="mobile-landscape-gate" aria-live="polite">
        <div class="mobile-landscape-card">
            <h1>NOVA HORIZON</h1>
            <p>Toque para abrir em tela cheia e jogar no celular em modo deitado.</p>
            <button type="button">JOGAR EM TELA CHEIA</button>
        </div>
    </div>
    <script>
        (() => {
            const isMobile = window.matchMedia('(pointer: coarse), (max-width: 820px)').matches;
            const gate = document.getElementById('mobile-landscape-gate');
            if (!isMobile || !gate) return;

            gate.classList.add('is-visible');

            const enterMobilePlay = async () => {
                try {
                    if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    }
                } catch (error) {
                    console.info('Fullscreen indisponivel neste navegador.', error);
                }

                try {
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape');
                    }
                } catch (error) {
                    console.info('Bloqueio de orientacao indisponivel neste navegador.', error);
                }

                gate.classList.add('is-hidden');
            };

            gate.querySelector('button').addEventListener('click', enterMobilePlay, { once: true });
        })();
    </script>
    <script src="src/cenas/MenuInicial.js"></script>
    <script src="CenaLoja.js"></script>
    <script src="src/cenas/CenaFase.js"></script>
    <script src="src/cenas/CenaPausa.js"></script>
    <script src="src/cenas/CenaCarregamento.js"></script>
    <script src="CenaCutsceneFuga.js"></script>
    <script src="src/main.js"></script>
    
</body>
</html>
